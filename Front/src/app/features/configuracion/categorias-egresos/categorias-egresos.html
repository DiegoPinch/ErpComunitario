<div class="bg-white rounded-lg shadow-md p-6">
    <p-toast></p-toast>
    <p-confirmDialog></p-confirmDialog>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Categorías de Egresos</h1>
        <p-button label="Nueva Categoría" icon="pi pi-plus" severity="info" (click)="openNew()"></p-button>
    </div>

    <app-custom-table [data]="(categories$ | async) || []" [columns]="cols" title="Listado de Categorías"
        [showIndex]="true" [globalFilterFields]="['name', 'description']" [actions]="actions">
    </app-custom-table>

    <!-- Modal de Registro/Edición -->
    <p-dialog [(visible)]="displayDialog" [header]="dialogTitle" [modal]="true" [style]="{ width: '35vw' }"
        [breakpoints]="{ '960px': '75vw', '640px': '90vw' }" [draggable]="false" [resizable]="false">

        <form [formGroup]="categoryForm" (ngSubmit)="saveCategory()" class="flex flex-col gap-4">

            <div class="flex flex-col gap-2">
                <label for="name" class="font-semibold text-gray-700">Nombre de la Categoría</label>
                <input type="text" pInputText id="name" formControlName="name"
                    placeholder="Ej: Sueldos, Energía Eléctrica..." autocomplete="off" />
                <small class="text-red-500"
                    *ngIf="categoryForm.get('name')?.invalid && categoryForm.get('name')?.touched">
                    El nombre es obligatorio (máx. 100 caracteres).
                </small>
            </div>

            <div class="flex flex-col gap-2">
                <label for="description" class="font-semibold text-gray-700">Descripción (Opcional)</label>
                <textarea id="description" pTextarea formControlName="description" rows="3"
                    placeholder="Detalle adicional de la categoría..."></textarea>
            </div>

            <div class="flex justify-end gap-2 mt-4 pt-4 border-t border-gray-100">
                <p-button label="Cancelar" icon="pi pi-times" severity="secondary" (click)="onCancel()"
                    [text]="true"></p-button>
                <p-button label="Guardar" icon="pi pi-check" type="submit" severity="info"
                    [disabled]="categoryForm.invalid"></p-button>
            </div>
        </form>
    </p-dialog>
</div>
